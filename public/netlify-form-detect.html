<!DOCTYPE html>
<html>
  <head><title>Netlify Form Detection</title></head>
  <body>
    <!--
      This file exists solely so Netlify's build-time crawler can detect
      the "contact" form. Next.js with output:'export' generates static HTML,
      but this file ensures 100% reliable detection regardless of crawl order.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" type="text" />
      <input name="phone" type="tel" />
      <input name="email" type="email" />
      <select name="care_type"></select>
      <input name="preferred_dates" type="text" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
